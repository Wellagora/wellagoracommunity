name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: vvunxewylcifwphxgqab

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy stripe-webhook
        run: supabase functions deploy stripe-webhook --project-ref $SUPABASE_PROJECT_ID

      - name: Deploy create-checkout-session
        run: supabase functions deploy create-checkout-session --project-ref $SUPABASE_PROJECT_ID

      - name: Deploy create-sponsor-invoice
        run: supabase functions deploy create-sponsor-invoice --project-ref $SUPABASE_PROJECT_ID

      - name: Deploy ai-chat
        run: supabase functions deploy ai-chat --project-ref $SUPABASE_PROJECT_ID

      - name: Deploy health-check
        run: supabase functions deploy health-check --project-ref $SUPABASE_PROJECT_ID

      - name: Deploy send-contact-email
        run: supabase functions deploy send-contact-email --project-ref $SUPABASE_PROJECT_ID

      - name: Deploy send-general-contact
        run: supabase functions deploy send-general-contact --project-ref $SUPABASE_PROJECT_ID
